name: Process Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Source URL"
        required: true
        type: string
      chat_id:
        required: true
        type: string
      message_id:
        required: true
        type: string
      status_msg_id:
        required: true
        type: string

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get install -y ffmpeg
          fi

      - name: Install Python Dependencies
        run: |
          python -m pip install -U pip
          pip install -U "yt-dlp[default,curl-cffi]" pyrogram tgcrypto redis

      - name: Setup config from secrets
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then
            printf "%s" "$YT_COOKIES" > cookies.txt
          fi

      - name: Process Source
        id: process
        continue-on-error: true
        run: |
          # Put your authorized processing logic here.
          # Example: run your own script or safe file processing pipeline.
          python your_script.py "${{ inputs.url }}" > result.txt

      - name: Get Title
        id: final_title
        if: always()
        run: |
          if [ -f result.txt ] && [ -s result.txt ]; then
            title="$(head -n 1 result.txt)"
          else
            title="untitled"
          fi
          echo "val=$title" >> $GITHUB_OUTPUT

      - name: Upload Result
        if: always()
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_SESSIONS: ${{ secrets.BOT_SESSIONS }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          python upload.py \
            "${{ inputs.chat_id }}" \
            "${{ inputs.message_id }}" \
            "${{ inputs.status_msg_id }}" \
            "${{ steps.final_title.outputs.val }}"
