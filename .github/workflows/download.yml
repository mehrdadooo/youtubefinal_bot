name: YouTube Downloader Worker

on:
  repository_dispatch:
    types: [download_video]

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Deno & FFmpeg
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends ffmpeg
          fi
          curl -fsSL https://deno.land/x/install/install.sh | sh
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      - name: Install Python Dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup YouTube Cookies
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        shell: bash
        run: |
          set -euo pipefail
          printf "%s" "$YT_COOKIES" > cookies.txt

      # 🚨 گام جدید: نصب و راه‌اندازی موتور Xray VLESS 🚨
      - name: Setup & Start Xray VLESS Proxy
        env:
          VLESS_LINK: ${{ secrets.VLESS_LINK }}
        shell: bash
        run: |
          set -euo pipefail
          wget https://github.com/XTLS/Xray-core/releases/download/v1.8.9/Xray-linux-64.zip
          unzip Xray-linux-64.zip
          chmod +x xray
          
          # اسکریپت پایتونِ درون‌خطی برای تبدیل VLESS به کانفیگ Xray
          python -c '
          import os, urllib.parse, json
          vless_url = os.environ.get("VLESS_LINK", "").split("#")[0]
          parsed = urllib.parse.urlparse(vless_url)
          qs = urllib.parse.parse_qs(parsed.query)
          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [{"port": 10808, "listen": "127.0.0.1", "protocol": "socks"}],
              "outbounds": [{
                  "protocol": "vless",
                  "settings": {"vnext": [{"address": parsed.hostname, "port": int(parsed.port or 443), "users": [{"id": parsed.username, "encryption": "none"}]}]},
                  "streamSettings": {
                      "network": qs.get("type", ["tcp"])[0],
                      "security": qs.get("security", ["none"])[0],
                      "wsSettings": {"path": qs.get("path", ["/"])[0], "headers": {"Host": qs.get("host", [""])[0]}},
                      "tlsSettings": {"serverName": qs.get("sni", [""])[0], "fingerprint": qs.get("fp", ["chrome"])[0], "alpn": qs.get("alpn", ["http/1.1"])[0].split(",")}
                  }
              }]
          }
          with open("config.json", "w") as f: json.dump(config, f)
          '
          
          nohup ./xray run -c config.json > xray.log 2>&1 &
          sleep 3
          curl -s -x socks5h://127.0.0.1:10808 https://icanhazip.com || echo "Xray failed to connect"

      # ─── گام اول: کلاینت اندروید (بدون کوکی و بدون پروکسی - نینجا) ───
      - name: Download Video (Ninja Mode - Android)
        id: download_ninja
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          
          QUALITY="${{ github.event.client_payload.quality }}"
          
          title=$(yt-dlp --get-title --impersonate chrome --extractor-args "youtube:player_client=android" --remote-components "ejs:github" --no-check-certificate --retries 5 "${{ github.event.client_payload.url }}")
          echo "title=$title" >> "$GITHUB_OUTPUT"

          if [ "$QUALITY" = "audio" ]; then
            yt-dlp -f "bestaudio/b" --extract-audio --audio-format mp3 --impersonate chrome --extractor-args "youtube:player_client=android" --remote-components "ejs:github" --no-check-certificate --retries 5 --fragment-retries infinite -o "video.%(ext)s" "${{ github.event.client_payload.url }}"
          else
            SORT_ARGS=""
            if [ "$QUALITY" = "1080" ]; then SORT_ARGS="-S height:1080"; fi
            if [ "$QUALITY" = "720" ]; then SORT_ARGS="-S height:720"; fi
            if [ "$QUALITY" = "480" ]; then SORT_ARGS="-S height:480"; fi

            yt-dlp -f "bv*+ba/b" $SORT_ARGS --merge-output-format mp4 --write-info-json --write-thumbnail --convert-thumbnails jpg --postprocessor-args "ffmpeg:-movflags +faststart" --impersonate chrome --extractor-args "youtube:player_client=android" --remote-components "ejs:github" --no-check-certificate --retries 5 --fragment-retries infinite -o "video.%(ext)s" "${{ github.event.client_payload.url }}"
          fi

      # ─── گام دوم: دانلود با پروکسی VLESS + کوکی + کلاینت TV (تانک سنگین) ───
      - name: Download Video (Tank Mode - VLESS + TV)
        id: download_tank
        if: steps.download_ninja.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          
          QUALITY="${{ github.event.client_payload.quality }}"

          title=$(yt-dlp --get-title --proxy "socks5h://127.0.0.1:10808" --cookies cookies.txt --impersonate chrome --extractor-args "youtube:player_client=tv" --remote-components "ejs:github" --no-check-certificate --force-ipv4 --retries 5 "${{ github.event.client_payload.url }}")
          echo "title=$title" >> "$GITHUB_OUTPUT"

          if [ "$QUALITY" = "audio" ]; then
            yt-dlp -f "bestaudio/b" --proxy "socks5h://127.0.0.1:10808" --extract-audio --audio-format mp3 --cookies cookies.txt --impersonate chrome --extractor-args "youtube:player_client=tv" --remote-components "ejs:github" --no-check-certificate --force-ipv4 --retries 10 --fragment-retries infinite -o "video.%(ext)s" "${{ github.event.client_payload.url }}"
          else
            SORT_ARGS=""
            if [ "$QUALITY" = "1080" ]; then SORT_ARGS="-S height:1080"; fi
            if [ "$QUALITY" = "720" ]; then SORT_ARGS="-S height:720"; fi
            if [ "$QUALITY" = "480" ]; then SORT_ARGS="-S height:480"; fi

            yt-dlp -f "bv*+ba/b" $SORT_ARGS --proxy "socks5h://127.0.0.1:10808" --merge-output-format mp4 --write-info-json --write-thumbnail --convert-thumbnails jpg --postprocessor-args "ffmpeg:-movflags +faststart" --cookies cookies.txt --impersonate chrome --extractor-args "youtube:player_client=tv" --remote-components "ejs:github" --no-check-certificate --force-ipv4 --retries 10 --fragment-retries infinite -o "video.%(ext)s" "${{ github.event.client_payload.url }}"
          fi

      # ─── گام سوم: دریافت تایتل ───
      - name: Get Final Title
        id: final_title
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.download_ninja.outcome }}" = "success" ]; then
            echo "val=${{ steps.download_ninja.outputs.title }}" >> "$GITHUB_OUTPUT"
          else
            echo "val=${{ steps.download_tank.outputs.title }}" >> "$GITHUB_OUTPUT"
          fi

      # ─── گام چهارم: آپلود به تلگرام (حذف گام Restore Network به دلیل ایمن بودن VLESS) ───
      - name: Upload Video to Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_SESSIONS: ${{ secrets.BOT_SESSIONS }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        shell: bash
        run: |
          set -euo pipefail
          python upload.py \
            "${{ github.event.client_payload.chat_id }}" \
            "${{ github.event.client_payload.message_id }}" \
            "${{ github.event.client_payload.status_msg_id }}" \
            "${{ steps.final_title.outputs.val }}"
