name: YouTube Downloader Worker

on:
  repository_dispatch:
    types: [download_video]

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 🚨 نصب ffmpeg برای سرعت و nodejs برای حل کدهای امنیتی جاوااسکریپت یوتیوب
      - name: Install System Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg nodejs npm

      - name: Install Python Dependencies
        run: |
          pip install -U yt-dlp pyrogram tgcrypto

      # 🍪 ساخت امنِ فایل کوکی از سکرت‌های گیت‌هاب
      - name: Setup YouTube Cookies
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          python -c "import os; open('cookies.txt', 'w', encoding='utf-8').write(os.environ.get('YT_COOKIES', ''))"

      # ─── دانلود مستقیم با کوکی و کلاینت موبایل (ضد-تحریم) ───
      - name: Download Video
        id: download_direct
        run: |
          # گرفتن عنوان ویدیو
          title=$(yt-dlp --get-title --cookies cookies.txt --extractor-args "youtube:player_client=ios,tv,android" --no-check-certificate --retries 5 "${{ github.event.client_payload.url }}")
          echo "title=$title" >> $GITHUB_OUTPUT
          
          # دانلود فیلم با سرعت بالا و رترای بی‌نهایت
          yt-dlp -f "best[ext=mp4]/best" --cookies cookies.txt --extractor-args "youtube:player_client=ios,tv,android" --no-check-certificate --retries infinite --fragment-retries infinite --concurrent-fragments 8 -o "video.%(ext)s" "${{ github.event.client_payload.url }}"

      # ─── آپلود نهایی به تلگرام ───
      - name: Upload Video to Telegram
        if: success() # فقط اگر دانلود موفق بود اجرا شود تا ارور فایل خالی ندهد
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          python upload.py \
            "${{ github.event.client_payload.chat_id }}" \
            "${{ github.event.client_payload.message_id }}" \
            "${{ github.event.client_payload.status_msg_id }}" \
            "${{ steps.download_direct.outputs.title }}"
