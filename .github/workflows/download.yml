name: YouTube Downloader Worker

on:
  repository_dispatch:
    types: [download_video]

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Deno & FFmpeg
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends ffmpeg
          fi
          curl -fsSL https://deno.land/x/install/install.sh | sh
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      - name: Install Python Dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup YouTube Cookies
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        shell: bash
        run: |
          set -euo pipefail
          printf "%s" "$YT_COOKIES" > cookies.txt

      # ─── گام اول: کلاینت اندروید (بدون کوکی - پرسرعت و اعمال کیفیت) ───
      - name: Download Video (Ninja Mode - Android)
        id: download_direct
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          
          # 🚨 دریافت کیفیت ارسالی از سمت هرمس
          QUALITY="${{ github.event.client_payload.quality }}"
          
          # استخراج تایتل
          title=$(yt-dlp --get-title --impersonate chrome --extractor-args "youtube:player_client=android" --remote-components "ejs:github" --no-check-certificate --retries 5 "${{ github.event.client_payload.url }}")
          echo "title=$title" >> "$GITHUB_OUTPUT"

          # 🚨 منطق هوشمند اعمال کیفیت و کاور 🚨
          if [ "$QUALITY" = "audio" ]; then
            yt-dlp -f "bestaudio/b" --extract-audio --audio-format mp3 --impersonate chrome --extractor-args "youtube:player_client=android" --remote-components "ejs:github" --no-check-certificate --retries 5 --fragment-retries infinite --concurrent-fragments 3 -o "video.%(ext)s" "${{ github.event.client_payload.url }}"
          else
            SORT_ARGS=""
            if [ "$QUALITY" = "1080" ]; then SORT_ARGS="-S height:1080"; fi
            if [ "$QUALITY" = "720" ]; then SORT_ARGS="-S height:720"; fi
            if [ "$QUALITY" = "480" ]; then SORT_ARGS="-S height:480"; fi

            yt-dlp -f "bv*+ba/b" $SORT_ARGS --merge-output-format mp4 --write-info-json --write-thumbnail --convert-thumbnails jpg --postprocessor-args "ffmpeg:-movflags +faststart" --impersonate chrome --extractor-args "youtube:player_client=android" --remote-components "ejs:github" --no-check-certificate --retries 5 --fragment-retries infinite --concurrent-fragments 3 -o "video.%(ext)s" "${{ github.event.client_payload.url }}"
          fi

      # ─── گام دوم: روشن کردن تونل WARP ───
      - name: Install & Run Cloudflare WARP (Fallback Mode)
        if: steps.download_direct.outcome == 'failure'
        uses: fscarmen/warp-on-actions@v1.1
        with:
          stack: dual

      # ─── گام سوم: دانلود با WARP + کوکی (تانک سنگین با اعمال کیفیت) ───
      - name: Download Video (via WARP Fallback)
        id: download_warp
        if: steps.download_direct.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          
          QUALITY="${{ github.event.client_payload.quality }}"

          title=$(yt-dlp --get-title --cookies cookies.txt --impersonate chrome --extractor-args "youtube:player_client=tv" --remote-components "ejs:github" --no-check-certificate --force-ipv4 --retries 5 "${{ github.event.client_payload.url }}")
          echo "title=$title" >> "$GITHUB_OUTPUT"

          if [ "$QUALITY" = "audio" ]; then
            yt-dlp -f "bestaudio/b" --extract-audio --audio-format mp3 --cookies cookies.txt --impersonate chrome --extractor-args "youtube:player_client=tv" --remote-components "ejs:github" --no-check-certificate --force-ipv4 --retries 10 --fragment-retries infinite -o "video.%(ext)s" "${{ github.event.client_payload.url }}"
          else
            SORT_ARGS=""
            if [ "$QUALITY" = "1080" ]; then SORT_ARGS="-S height:1080"; fi
            if [ "$QUALITY" = "720" ]; then SORT_ARGS="-S height:720"; fi
            if [ "$QUALITY" = "480" ]; then SORT_ARGS="-S height:480"; fi

            yt-dlp -f "bv*+ba/b" $SORT_ARGS --merge-output-format mp4 --write-info-json --write-thumbnail --convert-thumbnails jpg --postprocessor-args "ffmpeg:-movflags +faststart" --cookies cookies.txt --impersonate chrome --extractor-args "youtube:player_client=tv" --remote-components "ejs:github" --no-check-certificate --force-ipv4 --retries 10 --fragment-retries infinite -o "video.%(ext)s" "${{ github.event.client_payload.url }}"
          fi

      # ─── گام چهارم: دریافت تایتل ───
      - name: Get Final Title
        id: final_title
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.download_direct.outcome }}" = "success" ]; then
            echo "val=${{ steps.download_direct.outputs.title }}" >> "$GITHUB_OUTPUT"
          else
            echo "val=${{ steps.download_warp.outputs.title }}" >> "$GITHUB_OUTPUT"
          fi

      # ─── خاموش کردن پروکسی قبل از ارتباط با تلگرام ───
      - name: Restore Network (Disable WARP)
        if: always()
        shell: bash
        run: |
          sudo warp-cli disconnect || true
          sudo systemctl stop warp-svc || true

      # ─── گام پنجم: آپلود به تلگرام ───
      - name: Upload Video to Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_SESSIONS: ${{ secrets.BOT_SESSIONS }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        shell: bash
        run: |
          set -euo pipefail
          python upload.py \
            "${{ github.event.client_payload.chat_id }}" \
            "${{ github.event.client_payload.message_id }}" \
            "${{ github.event.client_payload.status_msg_id }}" \
            "${{ steps.final_title.outputs.val }}"
