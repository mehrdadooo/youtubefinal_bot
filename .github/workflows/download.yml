name: YouTube Downloader Worker

on:
  repository_dispatch:
    types: [download_video]

concurrency:
  group: download-video-${{ github.event.client_payload.message_id }}
  cancel-in-progress: false

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: .github/workflows/requirements.txt

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends ffmpeg
          fi

      - name: Install Python Dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -U pip
          pip install -r .github/workflows/requirements.txt

      - name: Setup YouTube Cookies
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${YT_COOKIES:-}" ]; then
            printf "%s" "$YT_COOKIES" > cookies.txt
          fi

      - name: Download Video
        id: download
        shell: bash
        run: |
          set -euo pipefail

          url="${{ github.event.client_payload.url }}"

          if [ -s cookies.txt ]; then
            title="$(yt-dlp --cookies cookies.txt --print title --skip-download "$url" | tail -n 1)"
            yt-dlp \
              --cookies cookies.txt \
              -f "bv*+ba/b" \
              --merge-output-format mp4 \
              --retries 5 \
              --fragment-retries 5 \
              -o "video.%(ext)s" \
              "$url"
          else
            title="$(yt-dlp --print title --skip-download "$url" | tail -n 1)"
            yt-dlp \
              -f "bv*+ba/b" \
              --merge-output-format mp4 \
              --retries 5 \
              --fragment-retries 5 \
              -o "video.%(ext)s" \
              "$url"
          fi

          echo "title=$title" >> "$GITHUB_OUTPUT"

      - name: Upload Video to Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_SESSIONS: ${{ secrets.BOT_SESSIONS }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        shell: bash
        run: |
          set -euo pipefail
          python upload.py \
            "${{ github.event.client_payload.chat_id }}" \
            "${{ github.event.client_payload.message_id }}" \
            "${{ github.event.client_payload.status_msg_id }}" \
            "${{ steps.download.outputs.title }}"
