name: YouTube Downloader Worker

on:
  repository_dispatch:
    types: [download_video]

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Deno & FFmpeg
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg curl unzip
          curl -fsSL https://deno.land/x/install/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Install Python Dependencies
        run: |
          pip install -U "yt-dlp[default,curl-cffi]" pyrogram tgcrypto redis

      - name: Setup YouTube Cookies
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          python -c "import os; open('cookies.txt', 'w', encoding='utf-8').write(os.environ.get('YT_COOKIES', ''))"

      # ─── گام اول: دانلود مستقیم ───
      - name: Download Video (Ninja Mode)
        id: download_direct
        run: |
          title=$(yt-dlp --get-title --impersonate chrome --extractor-args "youtube:player_client=android,web" --remote-components "ejs:github" --no-check-certificate --force-ipv4 --retries 5 "${{ github.event.client_payload.url }}")
          echo "title=$title" >> $GITHUB_OUTPUT
          
          yt-dlp -f "bv*+ba/b" --merge-output-format mp4 --impersonate chrome --extractor-args "youtube:player_client=android,web" --remote-components "ejs:github" --no-check-certificate --force-ipv4 --retries 5 --fragment-retries infinite --concurrent-fragments 3 -o "video.%(ext)s" "${{ github.event.client_payload.url }}"
        continue-on-error: true

      # ─── گام دوم: روشن کردن WARP در صورت نیاز ───
      - name: Install & Run Cloudflare WARP (Fallback Mode)
        if: steps.download_direct.outcome == 'failure'
        uses: fscarmen/warp-on-actions@v1.1
        with:
          stack: dual

      - name: Download Video (via WARP Fallback)
        id: download_warp
        if: steps.download_direct.outcome == 'failure'
        run: |
          title=$(yt-dlp --get-title --cookies cookies.txt --impersonate chrome --extractor-args "youtube:player_client=default" --remote-components "ejs:github" --no-check-certificate --retries 5 "${{ github.event.client_payload.url }}")
          echo "title=$title" >> $GITHUB_OUTPUT
          
          yt-dlp -f "bv*+ba/b" --merge-output-format mp4 --cookies cookies.txt --impersonate chrome --extractor-args "youtube:player_client=default" --remote-components "ejs:github" --no-check-certificate --retries 5 --fragment-retries infinite --concurrent-fragments 3 -o "video.%(ext)s" "${{ github.event.client_payload.url }}"

      # ─── گام سوم: دریافت تایتل ───
      - name: Get Final Title
        id: final_title
        run: |
          if [ "${{ steps.download_direct.outcome }}" = "success" ]; then
            echo "val=${{ steps.download_direct.outputs.title }}" >> $GITHUB_OUTPUT
          else
            echo "val=${{ steps.download_warp.outputs.title }}" >> $GITHUB_OUTPUT
          fi

      # 🚨 گام حیاتی جدید: خاموش کردن پروکسی قبل از تلگرام 🚨
      - name: Restore Network (Disable WARP)
        if: always()
        run: |
          sudo warp-cli disconnect || true
          sudo systemctl stop warp-svc || true

      # ─── گام چهارم: آپلود به تلگرام ───
      - name: Upload Video to Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_SESSIONS: ${{ secrets.BOT_SESSIONS }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          python upload.py \
            "${{ github.event.client_payload.chat_id }}" \
            "${{ github.event.client_payload.message_id }}" \
            "${{ github.event.client_payload.status_msg_id }}" \
            "${{ steps.final_title.outputs.val }}"
