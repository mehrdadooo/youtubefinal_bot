name: YouTube Downloader Worker

on:
  repository_dispatch:
    types: [download_video]

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # مهار حداکثری هزینه‌ها در صورت بروز هرگونه قطعی شبکه

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ─── مرحله ۱: تنظیم پایتون و فعال‌سازی کَش سریع pip ───
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # کَش کردن هوشمند پکیج‌ها برای استارت‌های بعدی

      # ─── مرحله ۲: نصب پکیج‌های پایتون ───
      - name: Install Python Dependencies
        run: |
          pip install -U "yt-dlp[default,curl-cffi]" pyrogram tgcrypto redis

      # ─── مرحله ۳: ساخت سریع فایل کوکی با بش (جایگزین مفسر پایتون) ───
      - name: Setup YouTube Cookies
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          printf "%s" "$YT_COOKIES" > cookies.txt

      # ─── مرحله ۴: دانلود سریع بدون کوکی (کلاینت اندروید) ───
      - name: Download Video (Ninja Mode - Android)
        id: download_direct
        run: |
          title=$(yt-dlp --get-title --impersonate chrome --extractor-args "youtube:player_client=android" --remote-components "ejs:github" --no-check-certificate --retries 5 "${{ github.event.client_payload.url }}")
          echo "title=$title" >> $GITHUB_OUTPUT
          
          yt-dlp -f "bv*+ba/b" --merge-output-format mp4 --impersonate chrome --extractor-args "youtube:player_client=android" --remote-components "ejs:github" --no-check-certificate --retries 5 --fragment-retries infinite --concurrent-fragments 3 -o "video.%(ext)s" "${{ github.event.client_payload.url }}"
        continue-on-error: true

      # ─── مرحله ۵: روشن کردن تونل WARP در صورت شکست گام اول ───
      - name: Install & Run Cloudflare WARP (Fallback Mode)
        if: steps.download_direct.outcome == 'failure'
        uses: fscarmen/warp-on-actions@v1.1
        with:
          stack: dual

      # ─── مرحله ۶: دانلود سنگین با WARP + تلویزیون ───
      - name: Download Video (via WARP Fallback)
        id: download_warp
        if: steps.download_direct.outcome == 'failure'
        run: |
          title=$(yt-dlp --get-title --cookies cookies.txt --impersonate chrome --extractor-args "youtube:player_client=tv" --remote-components "ejs:github" --no-check-certificate --force-ipv4 --retries 5 "${{ github.event.client_payload.url }}")
          echo "title=$title" >> $GITHUB_OUTPUT
          
          # حذف --concurrent-fragments برای جلوگیری از حساس شدن CDN یوتیوب روی کلودفلر
          yt-dlp -f "bv*+ba/b" --merge-output-format mp4 --cookies cookies.txt --impersonate chrome --extractor-args "youtube:player_client=tv" --remote-components "ejs:github" --no-check-certificate --force-ipv4 --retries 10 --fragment-retries infinite -o "video.%(ext)s" "${{ github.event.client_payload.url }}"

      # ─── مرحله ۷: دریافت تایتل نهایی ───
      - name: Get Final Title
        id: final_title
        run: |
          if [ "${{ steps.download_direct.outcome }}" = "success" ]; then
            echo "val=${{ steps.download_direct.outputs.title }}" >> $GITHUB_OUTPUT
          else
            echo "val=${{ steps.download_warp.outputs.title }}" >> $GITHUB_OUTPUT
          fi

      # ─── مرحله ۸: خاموش کردن پروکسی قبل از تلگرام (نسخه تخریب‌گر کارت شبکه مجازی کلودفلر) ───
      - name: Restore Network (Disable WARP)
        if: always()
        run: |
          sudo warp-cli disconnect || true
          sudo systemctl stop warp-svc || true
          sudo pkill -f warp || true
          sudo ip link delete wg0 || true
          sudo ip link delete wgcf || true
          sudo ip link delete CloudflareWARP || true
          sudo killall warp-svc || true

      # ─── مرحله ۹: آپلود به تلگرام با سشن‌های ۵ گانه ───
      - name: Upload Video to Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_SESSIONS: ${{ secrets.BOT_SESSIONS }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          python upload.py \
            "${{ github.event.client_payload.chat_id }}" \
            "${{ github.event.client_payload.message_id }}" \
            "${{ github.event.client_payload.status_msg_id }}" \
            "${{ steps.final_title.outputs.val }}"
